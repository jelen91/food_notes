<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Notes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Food Notes</h1>
      <section class="note-section">
        <label for="date">Datum</label>
        <input type="date" id="date" />

        <label for="note">Poznámky k jídlu</label>
        <textarea
          id="note"
          rows="8"
          placeholder="Napiš, co jsi měl ke snídani, obědu nebo večeři..."
        ></textarea>

        <button id="save">Uložit</button>
        <div id="message"></div>
      </section>

      <section class="report-section">
        <button id="loadReport">Zobrazit report všech dnů</button>
        <div id="report"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
